<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的程式種子 ── 期中作業展示</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    :root {
      --bg-color: #050a10;
      --accent-color: #00ffcc;
      --text-color: #e0f2f1;
      --panel-bg: rgba(10, 25, 40, 0.8);
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }
    /* 左側導覽區 (p5.js 畫布) */
    #canvas-container {
      flex: 0 0 40%;
      position: relative;
      border-right: 1px solid rgba(0, 255, 204, 0.2);
      background: radial-gradient(circle at center, #0a1a2a 0%, #050a10 100%);
    }
    /* 右側展示區 (Iframe) */
    #display-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      background: #020508;
    }
    #iframe-wrapper {
      flex: 1;
      border: 2px solid var(--accent-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* 底部說明區 */
    #info-panel {
      margin-top: 20px;
      padding: 15px 25px;
      background: var(--panel-bg);
      border-radius: 8px;
      border-left: 4px solid var(--accent-color);
      max-height: 180px;
      overflow-y: auto;
    }
    h1 {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 1.8rem;
      margin: 0;
      color: var(--accent-color);
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      pointer-events: none;
      z-index: 10;
    }
    .hint {
      position: absolute;
      bottom: 20px;
      left: 30px;
      font-size: 0.85rem;
      opacity: 0.6;
      pointer-events: none;
    }
    /* 捲軸樣式 */
    #info-panel::-webkit-scrollbar { width: 6px; }
    #info-panel::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 3px; }
  </style>
</head>
<body>

  <h1>我的程式種子<br><small style="font-size: 0.9rem; opacity: 0.7;">Midterm Project</small></h1>
  
  <div id="canvas-container">
    <div class="hint">點擊種子節點查看作業成果</div>
  </div>

  <div id="display-container">
    <div id="iframe-wrapper">
      <iframe id="work-frame" src="about:blank"></iframe>
    </div>
    
    <div id="info-panel">
      <h3 id="week-title">歡迎來到我的程式花園</h3>
      <p id="week-desc">這是一個結合本學期所學技術的期中報告。左側的「生長脈絡」使用了 <b>vertex</b> 繪製動態藤蔓，並透過 <b>class</b> 封裝了每個週次的互動節點。請點擊節點來探索我的學習歷程。</p>
      <div id="tech-points" style="font-size: 0.85rem; color: var(--accent-color); margin-top: 10px;">
        技術亮點：Vertex 造型、For 迴圈陣列、Class 物件導向、Iframe 嵌入
      </div>
    </div>
  </div>

  <script>
    let seeds = [];
    let vinePoints = [];
    let currentWeek = -1;
    
    const weekData = [
      { title: "Week 1: 初識 p5.js", desc: "學習基礎幾何圖形與座標系統，播下程式的種子。", url: "weeks/week1/index.html" },
      { title: "Week 2: Vertex 造型", desc: "運用 beginShape 與 vertex 繪製有機線條，讓種子開始萌芽。", url: "weeks/week2/index.html" },
      { title: "Week 3: For 迴圈與陣列", desc: "透過迴圈產生規律美感，讓程式的枝葉向外擴張。", url: "weeks/week3/index.html" },
      { title: "Week 4: Class 物件導向", desc: "將視覺元件封裝成物件，賦予每個生命獨立的動態與靈魂。", url: "weeks/week4/index.html" }
    ];

    function setup() {
      let cnv = createCanvas(windowWidth * 0.4, windowHeight);
      cnv.parent('canvas-container');
      
      // 初始化種子節點 (Class)
      for (let i = 0; i < 4; i++) {
        let x = width * 0.5;
        let y = height - (i + 1) * (height / 5);
        seeds.push(new Seed(x, y, i));
      }
    }

    function draw() {
      background(5, 10, 16);
      
      // 繪製藤蔓 (Vertex & For)
      drawVine();
      
      // 更新並顯示種子
      for (let s of seeds) {
        s.update();
        s.display();
      }
    }

    function drawVine() {
      noFill();
      stroke(0, 255, 150, 100);
      strokeWeight(3);
      
      beginShape();
      // 從底部向上生長
      for (let y = height; y >= height / 6; y -= 10) {
        let xOffset = sin(y * 0.01 + frameCount * 0.02) * 20;
        let x = width * 0.5 + xOffset;
        vertex(x, y);
      }
      endShape();
      
      // 繪製細小的鬚鬚
      strokeWeight(1);
      stroke(0, 255, 150, 50);
      for (let i = 0; i < 5; i++) {
        beginShape();
        let startY = height - i * 150;
        for (let y = startY; y > startY - 100; y -= 5) {
          let x = width * 0.5 + sin(y * 0.02 + frameCount * 0.03) * 40;
          vertex(x, y);
        }
        endShape();
      }
    }

    class Seed {
      constructor(x, y, index) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.index = index;
        this.size = 25;
        this.hoverSize = 0;
        this.isHovered = false;
        this.color = color(0, 255, 204);
      }

      update() {
        // 隨藤蔓擺動
        let xOffset = sin(this.baseY * 0.01 + frameCount * 0.02) * 20;
        this.x = this.baseX + xOffset;
        
        // 偵測滑鼠
        let d = dist(mouseX, mouseY, this.x, this.y);
        if (d < this.size / 2 + 10) {
          this.isHovered = true;
          this.hoverSize = lerp(this.hoverSize, 20, 0.1);
          cursor(HAND);
        } else {
          this.isHovered = false;
          this.hoverSize = lerp(this.hoverSize, 0, 0.1);
        }
      }

      display() {
        push();
        translate(this.x, this.y);
        
        // 發光效果
        noStroke();
        fill(0, 255, 204, 50 + this.hoverSize * 5);
        ellipse(0, 0, this.size + this.hoverSize * 2);
        
        // 核心種子 (Vertex 造型)
        fill(this.isHovered ? 255 : 0, 255, 204);
        beginShape();
        for (let a = 0; a < TWO_PI; a += 0.5) {
          let r = (this.size / 2) + sin(a * 3 + frameCount * 0.1) * (this.isHovered ? 5 : 2);
          vertex(cos(a) * r, sin(a) * r);
        }
        endShape(CLOSE);
        
        // 文字標籤
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(12);
        text("W" + (this.index + 1), 0, 0);
        
        if (this.isHovered) {
          textSize(14);
          textStyle(BOLD);
          text(weekData[this.index].title, 0, -35);
        }
        pop();
      }

      clicked() {
        let d = dist(mouseX, mouseY, this.x, this.y);
        if (d < this.size / 2 + 10) {
          loadWeek(this.index);
        }
      }
    }

    function mousePressed() {
      for (let s of seeds) {
        s.clicked();
      }
    }

    function loadWeek(idx) {
      const data = weekData[idx];
      document.getElementById('work-frame').src = data.url;
      document.getElementById('week-title').innerText = data.title;
      document.getElementById('week-desc').innerText = data.desc;
      currentWeek = idx;
    }

    function windowResized() {
      resizeCanvas(windowWidth * 0.4, windowHeight);
      // 重新定位種子
      for (let i = 0; i < seeds.length; i++) {
        seeds[i].baseX = width * 0.5;
        seeds[i].baseY = height - (i + 1) * (height / 5);
      }
    }
  </script>
</body>
</html>
